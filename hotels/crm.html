<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotels CRM · shou</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Cdefs%3E%3ClinearGradient id='b' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff2e7e'/%3E%3Cstop offset='1' stop-color='%23ff9966'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='3' y='22' width='3' height='10' rx='1' fill='url(%23b)'/%3E%3Crect x='8' y='18' width='3' height='14' rx='1' fill='url(%23b)'/%3E%3Crect x='13' y='15' width='3' height='17' rx='1' fill='url(%23b)'/%3E%3Crect x='18' y='17' width='3' height='15' rx='1' fill='url(%23b)'/%3E%3Crect x='23' y='20' width='3' height='12' rx='1' fill='url(%23b)'/%3E%3Crect x='28' y='24' width='3' height='8' rx='1' fill='url(%23b)'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500..800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#15101b; --text:#1a1622; --text-soft:#5b5566; --text-dim:#8a8494;
    --bg:#ffffff; --panel:#ffffff; --panel-soft:#faf8fc;
    --panel-bd:rgba(20,16,30,0.10); --line:rgba(20,16,30,0.10);
    --pink:#ff3d8b; --orange:#ff9b3d; --cyan:#0e9a8d; --violet:#9b5cff;
    --red:#c81e5b; --green:#0e9a5d;
    --grad:linear-gradient(105deg,var(--pink),var(--orange));
    --shadow-lift:0 14px 34px -14px rgba(20,16,30,.22);
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--panel-soft);color:var(--text);font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.55;min-height:100vh}
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.015em;line-height:1.15;color:var(--ink)}
  a{color:inherit}
  button{font-family:inherit;cursor:pointer}

  nav{position:sticky;top:0;z-index:20;backdrop-filter:blur(12px);background:rgba(255,255,255,0.88);border-bottom:1px solid var(--line)}
  .nav-in{max-width:1180px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .brand{font-family:'Fraunces',serif;font-weight:700;font-size:24px;text-decoration:none;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .brand small{font-family:'Inter';font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);-webkit-text-fill-color:var(--text-dim);margin-left:8px}
  .nav-actions{display:flex;gap:10px;align-items:center;font-size:13px;color:var(--text-dim)}
  .nav-actions button{background:none;border:1px solid var(--line);border-radius:9px;padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--text-soft)}
  .nav-actions button:hover{color:var(--pink);border-color:rgba(255,61,139,.4)}

  .wrap{max-width:1180px;margin:0 auto;padding:22px 20px 90px}
  .card{background:var(--panel);border:1px solid var(--panel-bd);border-radius:var(--radius);box-shadow:0 6px 18px -10px rgba(20,16,30,.12);padding:18px}

  /* token gate */
  #gate{max-width:420px;margin:80px auto}
  #gate h1{font-size:26px;margin-bottom:8px}
  #gate p{color:var(--text-soft);font-size:14px;margin-bottom:16px}
  #gate input{width:100%;font-size:15px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-family:inherit}
  #gate button{width:100%;margin-top:12px;background:var(--grad);color:#fff;font-weight:700;font-size:15px;padding:12px;border:none;border-radius:12px}

  /* quick log */
  #quicklog textarea{width:100%;font-family:inherit;font-size:15px;color:var(--text);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;resize:vertical;min-height:64px}
  #quicklog textarea:focus{outline:none;border-color:rgba(255,61,139,.55);box-shadow:0 0 0 3px rgba(255,61,139,.10)}
  .ql-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:10px}
  .ql-hint{font-size:12.5px;color:var(--text-dim)}
  .btn{background:var(--grad);color:#fff;font-weight:700;font-size:14px;padding:10px 20px;border:none;border-radius:11px;transition:filter .15s}
  .btn:hover:not(:disabled){filter:brightness(1.06)}
  .btn:disabled{opacity:.55;cursor:default}
  .btn2{background:#fff;color:var(--ink);font-weight:600;font-size:13.5px;padding:9px 16px;border:1px solid var(--line);border-radius:11px}
  .btn2:hover{border-color:rgba(255,61,139,.5);color:var(--pink)}
  .btn-danger{background:#fff;color:var(--red);border:1px solid rgba(200,30,91,.35);font-weight:600;font-size:13px;padding:8px 14px;border-radius:10px}

  /* proposal */
  #proposal{margin-top:14px;border:1px dashed rgba(155,92,255,.5);background:rgba(155,92,255,.05);border-radius:12px;padding:14px 16px;display:none}
  #proposal.show{display:block}
  #proposal .p-head{font-weight:700;font-size:14px;color:var(--violet);margin-bottom:8px}
  #proposal ul{list-style:none;font-size:13.5px}
  #proposal li{padding:3px 0}
  #proposal li b{font-weight:600}
  #proposal .p-actions{display:flex;gap:10px;margin-top:12px}
  /* per-hotel AI notes box (drawer) */
  #ai-text{width:100%;min-height:64px;font-family:inherit;font-size:14px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;resize:vertical;background:#fff;box-sizing:border-box}
  #ai-out{margin-top:12px}
  .ai-answer{background:rgba(70,224,210,.10);border:1px solid rgba(70,224,210,.38);border-radius:11px;padding:12px 14px;font-size:13.5px;line-height:1.5;white-space:pre-wrap}
  .ai-prop{border:1px dashed rgba(155,92,255,.5);background:rgba(155,92,255,.06);border-radius:11px;padding:12px 14px}
  .ai-prop .p-head{font-weight:700;font-size:13.5px;color:var(--violet);margin-bottom:6px}
  .ai-prop ul{list-style:none;font-size:13px}
  .ai-prop li{padding:3px 0}
  .ai-prop .p-actions{display:flex;gap:10px;margin-top:10px}
  .sum-stats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .sum-stat{font-size:13px;color:var(--text-soft);background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 12px}
  .sum-stat b{color:var(--ink);font-weight:700}
  .sum-narr{font-size:14px;line-height:1.55;color:var(--text);white-space:pre-wrap;
    background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px}

  /* toolbar + list */
  .toolbar{display:flex;gap:12px;align-items:center;margin:22px 0 12px;flex-wrap:wrap}
  .toolbar input{flex:1;min-width:200px;font-size:14px;padding:10px 14px;border:1px solid var(--line);border-radius:11px;font-family:inherit;background:#fff}
  .toolbar input:focus{outline:none;border-color:rgba(255,61,139,.45)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line);
    position:sticky;top:62px;background:var(--panel);z-index:5}
  /* overflow-x on the card kills position:sticky (it becomes the scroll
     container) — so: sticky header on desktop, horizontal scroll on mobile. */
  .table-card{overflow:visible}
  @media(max-width:900px){.table-card{overflow-x:auto} th{position:static;top:auto}}
  th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
  th.sortable:hover{color:var(--pink)}
  th .arrow{display:inline-block;width:12px;font-size:9px;margin-left:3px}
  .auto-tag{font-size:9.5px;color:var(--violet);font-weight:700;letter-spacing:.06em;margin-left:6px;vertical-align:1px}
  .revive-tag{font-size:9.5px;color:#b06400;font-weight:700;letter-spacing:.06em;margin-left:6px;vertical-align:1px}

  /* calendar */
  #cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  #cal-title{font-family:'Fraunces',serif;font-weight:600;font-size:17px;color:var(--ink)}
  .cal-nav{display:flex;gap:6px;align-items:center}
  .cal-nav button{background:#fff;border:1px solid var(--line);border-radius:8px;font-size:13px;font-weight:600;
    padding:4px 10px;color:var(--text-soft);cursor:pointer}
  .cal-nav button:hover{color:var(--pink);border-color:rgba(255,61,139,.4)}
  #cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-dow{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text-dim);text-align:center;padding:2px 0}
  .cal-cell{position:relative;min-height:44px;border:1px solid transparent;border-radius:10px;padding:4px 6px;
    font-size:12px;color:var(--text-soft);cursor:default;background:transparent}
  .cal-cell.in-month{background:var(--panel-soft);border-color:var(--line)}
  .cal-cell.has{cursor:pointer}
  .cal-cell.has:hover{border-color:rgba(255,61,139,.45)}
  .cal-cell.today{border-color:var(--pink)}
  .cal-cell.selected{background:rgba(255,61,139,.09);border-color:var(--pink)}
  .cal-badges{position:absolute;bottom:4px;right:5px;display:flex;gap:3px}
  .cal-count{min-width:20px;text-align:center;font-size:11px;font-weight:800;
    border-radius:999px;padding:1px 6px;background:var(--cyan);color:#fff}
  .cal-count.late{background:var(--red)}
  .cal-count.auto{background:var(--violet)}
  #cal-hint{font-size:11.5px;color:var(--text-dim);margin-top:8px}

  /* metrics */
  #funnel{display:flex;gap:8px;flex-wrap:wrap}
  .f-chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:999px;
    border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--text-soft);transition:border-color .15s}
  .f-chip:hover{border-color:rgba(255,61,139,.4)}
  .f-chip.active{border-color:var(--pink);color:var(--pink);box-shadow:0 0 0 2px rgba(255,61,139,.12)}
  .f-chip b{font-size:13.5px;color:var(--ink)}
  .f-chip.active b{color:var(--pink)}
  #stat-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:14px}
  .tile{background:var(--panel-soft);border:1px solid var(--line);border-radius:12px;padding:10px 14px}
  .tile .t-num{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--ink);line-height:1.1}
  .tile .t-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);margin-top:3px}
  .tile.warn .t-num{color:var(--red)}
  td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}
  tbody tr{cursor:pointer;transition:background .12s}
  tbody tr:hover{background:rgba(255,61,139,.035)}
  .h-name{font-weight:700;color:var(--ink)}
  .h-city{color:var(--text-dim);font-size:12.5px}
  .badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .st-prospect{background:rgba(20,16,30,.06);color:var(--text-soft)}
  .st-contacted{background:rgba(255,155,61,.14);color:#b06400}
  .st-demo_scheduled{background:rgba(155,92,255,.14);color:#6a2fd0}
  .st-demo_done{background:rgba(155,92,255,.22);color:#5a1fc0}
  .st-pilot{background:rgba(14,154,141,.14);color:var(--cyan)}
  .st-live{background:rgba(14,154,93,.16);color:var(--green)}
  .st-declined{background:rgba(200,30,91,.10);color:var(--red)}
  .due{color:var(--red);font-weight:700}
  .soon{color:#b06400;font-weight:600}
  .dim{color:var(--text-dim)}
  .demo-link{color:var(--cyan);font-weight:600;text-decoration:none;font-size:12.5px}
  .empty{padding:40px;text-align:center;color:var(--text-dim);font-size:14px}

  /* detail overlay */
  #overlay{position:fixed;inset:0;background:rgba(20,16,30,.35);z-index:40;display:none}
  #overlay.show{display:block}
  #drawer{position:fixed;top:0;right:0;bottom:0;width:min(680px,100%);background:var(--panel-soft);z-index:50;
    box-shadow:-20px 0 50px -20px rgba(20,16,30,.4);transform:translateX(102%);transition:transform .22s ease;overflow-y:auto}
  #drawer.show{transform:translateX(0)}
  .d-in{padding:22px 24px 60px}
  .d-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}
  .d-top h2{font-size:24px}
  .d-close{background:none;border:none;font-size:26px;color:var(--text-dim);line-height:1}
  .d-close:hover{color:var(--ink)}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .fgrid .full{grid-column:1 / -1}
  @media(max-width:560px){.fgrid{grid-template-columns:1fr}}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:4px}
  .field input,.field select,.field textarea{width:100%;font-family:inherit;font-size:14px;color:var(--text);
    background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 12px}
  .field textarea{resize:vertical;min-height:90px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:rgba(255,61,139,.5)}
  .d-section{margin-top:22px}
  .d-section h3{font-size:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  /* contact row: two columns (name/role, email/phone) so every value stays readable
     at the drawer's width on both desktop and mobile; actions on their own row */
  .contact-row{display:grid;gap:6px 8px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--line);
    grid-template-columns:1fr 1fr;
    grid-template-areas:"name role" "email phone" "actions actions"}
  .contact-row:last-child{border-bottom:none;padding-bottom:0;margin-bottom:4px}
  .c-name{grid-area:name} .c-role{grid-area:role} .c-email{grid-area:email} .c-phone{grid-area:phone}
  .c-actions{grid-area:actions;display:flex;gap:5px;justify-content:flex-end}
  .contact-row input{font-size:12.5px;padding:8px 9px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:#fff;width:100%;min-width:0}
  .c-act{background:#fff;border:1px solid var(--line);border-radius:8px;font-size:13px;cursor:pointer;line-height:1;width:34px;height:34px;flex:none;display:inline-flex;align-items:center;justify-content:center}
  .c-act:hover{border-color:rgba(255,61,139,.45)}
  .c-act:disabled{opacity:.3;cursor:default}
  .c-del{background:none;border:none;color:var(--text-dim);font-size:16px;width:30px;height:34px;flex:none;cursor:pointer}
  .c-del:hover{color:var(--red)}
  /* on a narrow phone, give email + phone the full width so long addresses aren't cut */
  @media(max-width:560px){
    .contact-row{grid-template-areas:"name role" "email email" "phone phone" "actions actions"}
  }
  .d-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;align-items:center}
  .d-msg{font-size:13px;font-weight:600}

  /* outreach */
  #outreach-box .o-item{background:#fff;border:1px solid var(--panel-bd);border-radius:12px;padding:14px 16px;margin-bottom:10px}
  #outreach-box .o-label{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;
    letter-spacing:.09em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
  #outreach-box .o-body{font-size:13.5px;white-space:pre-wrap}
  .copy-btn{background:#fff;border:1px solid var(--line);border-radius:8px;font-size:11.5px;font-weight:600;padding:4px 10px;color:var(--text-soft)}
  .copy-btn:hover{color:var(--pink);border-color:rgba(255,61,139,.4)}
  .o-meta{font-size:12px;color:var(--text-dim);margin-bottom:10px}

  /* log */
  .log-item{border-left:2px solid var(--line);padding:6px 0 6px 14px;margin-left:4px;font-size:13px}
  .log-item .lk{font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--violet);margin-right:8px}
  .log-item .lt{color:var(--text-dim);font-size:11.5px}
  .log-item .lr{color:var(--text-soft);margin-top:2px;white-space:pre-wrap}

  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;
    font-size:13.5px;font-weight:600;padding:11px 20px;border-radius:12px;transition:transform .25s;z-index:90}
  #toast.show{transform:translateX(-50%) translateY(0)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp 0.7s linear infinite;vertical-align:-2px;margin-right:7px}
  .spin.dark{border-color:rgba(20,16,30,.2);border-top-color:var(--ink)}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* import modal */
  #imp-overlay{position:fixed;inset:0;background:rgba(20,16,30,.4);z-index:60;display:none}
  #imp-overlay.show{display:block}
  #imp-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.97);z-index:70;display:none;
    width:min(560px,92vw);max-height:82vh;overflow-y:auto;background:var(--panel);border:1px solid var(--panel-bd);
    border-radius:18px;box-shadow:var(--shadow-lift);padding:26px 28px;opacity:0;transition:opacity .18s,transform .18s}
  #imp-modal.show{display:block;opacity:1;transform:translate(-50%,-50%) scale(1)}
  #imp-modal h3{font-family:'Fraunces',serif;font-weight:600;font-size:21px;color:var(--ink);margin-bottom:6px}
  #imp-modal .imp-sub{font-size:13.5px;color:var(--text-soft);margin-bottom:18px}
  .imp-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .imp-stat{flex:1;min-width:96px;background:var(--panel-soft);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .imp-stat .n{font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:var(--ink);line-height:1.05}
  .imp-stat.new .n{color:var(--cyan)} .imp-stat.upd .n{color:var(--violet)} .imp-stat.warn .n{color:var(--red)}
  .imp-stat .l{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);margin-top:3px}
  .imp-list{max-height:230px;overflow-y:auto;border:1px solid var(--line);border-radius:12px;padding:6px 10px;margin-bottom:16px;font-size:13px}
  .imp-list .r{padding:4px 0;display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line)}
  .imp-list .r:last-child{border-bottom:none}
  .imp-tag{font-size:10px;font-weight:800;letter-spacing:.05em;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .imp-tag.new{background:rgba(14,154,141,.14);color:var(--cyan)} .imp-tag.exist{background:rgba(155,92,255,.14);color:var(--violet)}
  .imp-actions{display:flex;gap:10px;justify-content:flex-end}
  /* collapsible outreach blocks */
  #outreach-box .o-block{background:#fff;border:1px solid var(--panel-bd);border-radius:12px;padding:11px 14px;margin-bottom:10px}
  .o-bhead{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .o-toggle{background:none;border:none;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;padding:0;display:flex;align-items:center;gap:7px}
  .o-chev{color:var(--violet);font-size:12px}
  .o-prev{margin-top:8px;font-size:13px;color:var(--text-soft);line-height:1.5}
  .o-full{margin-top:9px}
  .o-ta{width:100%;font-family:inherit;font-size:13.5px;line-height:1.55;border:1px solid var(--line);border-radius:9px;padding:10px 12px;resize:vertical;box-sizing:border-box}
  .o-view{font-size:13.5px;overflow-x:auto}
  .o-editbtn{background:none;border:none;color:var(--violet);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;padding:8px 0 0}
  /* outreach settings modal (reuses #imp-modal chrome) */
  #set-overlay{position:fixed;inset:0;background:rgba(20,16,30,.4);z-index:60;display:none}
  #set-overlay.show{display:block}
  #set-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.97);z-index:70;display:none;
    width:min(680px,94vw);max-height:88vh;overflow-y:auto;background:var(--panel-soft);border-radius:18px;
    padding:26px 28px;box-shadow:0 30px 80px rgba(20,16,30,.4);opacity:0;transition:opacity .15s,transform .15s}
  #set-modal.show{display:block;opacity:1;transform:translate(-50%,-50%) scale(1)}
  #set-modal h3{font-family:'Fraunces',serif;font-weight:600;font-size:21px;color:var(--ink);margin-bottom:4px}
  #set-modal .set-sub{font-size:13px;color:var(--text-soft);margin-bottom:16px}
  .set-field{margin-bottom:16px}
  .set-field .set-lh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
  .set-field label{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--text-dim);text-transform:uppercase}
  .set-reset{background:none;border:none;font-size:11.5px;color:var(--violet);cursor:pointer;font-family:inherit}
  .set-field textarea{width:100%;font-family:inherit;font-size:13.5px;line-height:1.5;border:1px solid var(--line);border-radius:10px;padding:10px 12px;resize:vertical;box-sizing:border-box}
  .set-hint{font-size:11.5px;color:var(--text-dim);margin-top:4px}
  .set-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
</style>
</head>
<body>

<nav><div class="nav-in">
  <a class="brand" href="/">shou<small>Hotels CRM</small></a>
  <div class="nav-actions">
    <span id="count"></span>
    <button id="btn-add" style="display:none">+ Add hotel</button>
    <button id="btn-logout" style="display:none">Lock</button>
  </div>
</div></nav>

<!-- token gate -->
<div id="gate" class="card">
  <h1>Hotels CRM</h1>
  <p>Enter the admin token to unlock.</p>
  <input id="gate-token" type="password" placeholder="Admin token" autocomplete="current-password">
  <button id="gate-go">Unlock</button>
  <p id="gate-err" style="color:var(--red);margin:10px 0 0;display:none">Wrong token.</p>
</div>

<div class="wrap" id="app" style="display:none">

  <!-- quick log -->
  <div class="card" id="quicklog">
    <textarea id="ql-text" placeholder="Log an activity — “Spoke to Brian at Hotel Amigo, demo tomorrow 15:00” — or ask a question — “summarize last week”. Logs are confirmed before saving; questions just answer."></textarea>
    <div class="ql-row">
      <span class="ql-hint">Mentions of contacts, dates, status and requests are extracted automatically. Nothing is saved until you confirm.</span>
      <button class="btn" id="ql-go">Log it</button>
    </div>
    <div id="proposal"></div>
  </div>

  <!-- metrics -->
  <div class="card" id="metrics" style="margin-top:14px;display:none">
    <div id="funnel"></div>
    <div id="stat-tiles"></div>
  </div>

  <!-- follow-up calendar -->
  <div class="card" id="cal" style="margin-top:14px;display:none">
    <div id="cal-head">
      <span id="cal-title"></span>
      <span class="cal-nav">
        <button id="cal-prev">‹</button>
        <button id="cal-today">Today</button>
        <button id="cal-next">›</button>
      </span>
    </div>
    <div id="cal-grid"></div>
    <div id="cal-hint"></div>
  </div>

  <!-- list -->
  <div class="toolbar">
    <input id="search" type="search" placeholder="Search hotels, cities, contacts…">
    <button class="btn2" id="btn-export" title="Download all hotels + contacts as CSV">⬇ Export CSV</button>
    <button class="btn2" id="btn-import" title="Add hotels / contacts from a CSV">⬆ Import CSV</button>
    <input type="file" id="import-file" accept=".csv,text/csv" style="display:none">
    <button class="btn2" id="btn-settings" title="Edit the template blocks + tone used to generate outreach emails">⚙ Outreach settings</button>
  </div>
  <div class="card table-card" style="padding:6px 14px 2px">
    <table>
      <thead><tr>
        <th class="sortable" data-key="name">Hotel<span class="arrow"></span></th>
        <th class="sortable" data-key="status">Status<span class="arrow"></span></th>
        <th class="sortable" data-key="next">Next follow-up<span class="arrow"></span></th>
        <th class="sortable" data-key="lastmail">Last email<span class="arrow"></span></th>
        <th class="sortable" data-key="lastreply">Last reply<span class="arrow"></span></th>
        <th class="sortable" data-key="demo">Demo<span class="arrow"></span></th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">No hotels yet — add one or just log a note above.</div>
  </div>
</div>

<!-- detail drawer -->
<div id="overlay"></div>
<div id="drawer"><div class="d-in" id="drawer-in"></div></div>
<div id="toast"></div>

<!-- import preview modal -->
<div id="imp-overlay"></div>
<div id="imp-modal"><div id="imp-body"></div></div>

<!-- outreach settings (admin) modal -->
<div id="set-overlay"></div>
<div id="set-modal"><div id="set-body"></div></div>

<script>
const API = 'https://shou-backend.vercel.app/api/crm';
const STATUSES = ['prospect','contacted','demo_scheduled','demo_done','pilot','live','declined'];
const ST_LABEL = { prospect:'Prospect', contacted:'Contacted', demo_scheduled:'Demo scheduled', demo_done:'Demo done', pilot:'Pilot', live:'Live', declined:'Declined' };
const FIELD_LABEL = { name:'Name', city:'City', website:'Website', demo_url:'Demo URL', pilot_status:'Status',
  last_email_at:'Last email', last_reply_at:'Last reply', next_follow_up:'Next follow-up', note_append:'Note', contact:'Contact', notes:'Notes' };

let token = localStorage.getItem('shou_crm_token') || '';
let hotels = [];
let stats = null;        // log-based totals from op=list
let statusFilter = null; // active funnel chip
let current = null;      // hotel open in drawer
let proposal = null;     // pending parse proposal

const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 2600);
}

async function api(op, opts = {}) {
  const isGet = opts.method !== 'POST';
  const url = isGet ? `${API}?op=${op}${opts.qs || ''}` : API;
  const r = await fetch(url, {
    method: isGet ? 'GET' : 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
    body: isGet ? undefined : JSON.stringify({ op, ...opts.body }),
  });
  const data = await r.json().catch(() => ({}));
  if (r.status === 401) { lock(); throw new Error('Unauthorized'); }
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

/* ---------- date formatting ---------- */
function fmtDT(iso, withTime = true) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const opt = { day: 'numeric', month: 'short', timeZone: 'Europe/Brussels' };
  if (withTime) { opt.hour = '2-digit'; opt.minute = '2-digit'; }
  if (d.getFullYear() !== new Date().getFullYear()) opt.year = 'numeric';
  return d.toLocaleString('en-GB', opt);
}
function toLocalInput(iso) {  // ISO → value for <input type=datetime-local> in Brussels time
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const s = d.toLocaleString('sv-SE', { timeZone: 'Europe/Brussels' });
  return s.slice(0, 16).replace(' ', 'T');
}
function followUpClass(iso) {
  if (!iso) return 'dim';
  const diff = new Date(iso) - Date.now();
  if (diff < 0) return 'due';
  if (diff < 48 * 3600 * 1000) return 'soon';
  return '';
}

/* ---------- gate ---------- */
function lock() {
  localStorage.removeItem('shou_crm_token'); token = '';
  $('app').style.display = 'none'; $('gate').style.display = 'block';
  $('btn-add').style.display = 'none'; $('btn-logout').style.display = 'none';
}
async function unlock(tok) {
  token = tok;
  try {
    const d = await api('list');
    localStorage.setItem('shou_crm_token', tok);
    $('gate').style.display = 'none'; $('app').style.display = 'block';
    $('btn-add').style.display = ''; $('btn-logout').style.display = '';
    hotels = d.hotels; stats = d.stats || null; renderList();
  } catch (e) {
    $('gate-err').style.display = 'block';
    $('gate-err').textContent = e.message === 'Unauthorized' ? 'Wrong token.' : 'Error: ' + e.message;
  }
}
$('gate-go').onclick = () => unlock($('gate-token').value.trim());
$('gate-token').addEventListener('keydown', e => { if (e.key === 'Enter') unlock($('gate-token').value.trim()); });
$('btn-logout').onclick = lock;

/* ---------- list ---------- */
async function refresh() {
  const d = await api('list');
  hotels = d.hotels; stats = d.stats || stats; renderList();
}
/* ---------- metrics ---------- */
function renderMetrics() {
  const box = $('metrics'); if (!box) return;
  box.style.display = hotels.length ? 'block' : 'none';
  if (!hotels.length) return;
  const byStatus = {};
  for (const h of hotels) byStatus[h.pilot_status] = (byStatus[h.pilot_status] || 0) + 1;
  $('funnel').innerHTML = STATUSES.filter(s => byStatus[s]).map(s =>
    `<span class="f-chip${statusFilter === s ? ' active' : ''}" data-st="${s}"><b>${byStatus[s]}</b>${esc(ST_LABEL[s])}</span>`
  ).join('');
  for (const chip of $('funnel').querySelectorAll('.f-chip')) {
    chip.onclick = () => { statusFilter = statusFilter === chip.dataset.st ? null : chip.dataset.st; renderList(); };
  }
  // sequence-level counters from the CURRENT sequence of each hotel
  let delivered = 0, opened = 0, bounced = 0, active = 0;
  for (const h of hotels) {
    const seq = h.sequence; if (!seq) continue;
    if (!seq.canceled_at && (seq.emails || []).some(e => e.status === 'scheduled')) active++;
    for (const e of seq.emails || []) {
      if (e.delivered_at) delivered++;
      if (e.opened_at) opened++;
      if (e.status === 'bounced' || e.status === 'complained') bounced++;
    }
  }
  const overdue = hotels.filter(h => { const n = nextTouch(h); return n && new Date(n.t) < Date.now(); }).length;
  const tile = (num, label, warn) => `<div class="tile${warn && num > 0 ? ' warn' : ''}"><div class="t-num">${num}</div><div class="t-label">${label}</div></div>`;
  $('stat-tiles').innerHTML =
    tile(stats ? stats.sequences_started : 0, 'Sequences sent') +
    tile(active, 'Running now') +
    tile(delivered, 'Delivered*') +
    tile(opened, 'Opened*') +
    tile(stats ? stats.replies : 0, 'Replies') +
    tile(bounced, 'Bounced', true) +
    tile(overdue, 'Overdue', true) +
    `<div class="tile" style="display:flex;align-items:center"><div class="t-label" style="margin:0">*current sequences; opens need Resend tracking enabled</div></div>`;
}
// Effective "next touch": the earliest of the manual follow-up date, the next
// scheduled sequence email (✉ AUTO), and — for non-responders still stuck in
// prospect/contacted after a sequence ran — a revive touch at start + 6 weeks
// (♻ REVIVE). All derived, so nothing needs a cron and nothing gets forgotten.
function nextTouch(h) {
  const cands = [];
  if (h.next_follow_up) cands.push({ t: h.next_follow_up, kind: 'manual' });
  const seq = h.sequence;
  if (seq && !seq.canceled_at) {
    for (const e of seq.emails || []) {
      if (e.status === 'scheduled' && e.scheduled_at && new Date(e.scheduled_at) > Date.now()) {
        cands.push({ t: e.scheduled_at, kind: 'auto' });
      }
    }
  }
  if (seq && seq.started_at
      && ['prospect', 'contacted'].includes(h.pilot_status)
      && !(h.last_reply_at && new Date(h.last_reply_at) >= new Date(seq.started_at))) {
    cands.push({ t: new Date(new Date(seq.started_at).getTime() + 42 * 864e5).toISOString(), kind: 'revive' });
  }
  cands.sort((a, b) => new Date(a.t) - new Date(b.t));
  return cands[0] || null;
}
const ST_ORDER = { prospect: 0, contacted: 1, demo_scheduled: 2, demo_done: 3, pilot: 4, live: 5, declined: 6 };
let sortKey = 'next', sortDir = 1;

/* ---------- follow-up calendar ---------- */
const beDay = iso => new Intl.DateTimeFormat('en-CA', { timeZone: 'Europe/Brussels' }).format(new Date(iso));
let calMonth = null;      // {y, m} — anchor month
let calSelected = null;   // 'YYYY-MM-DD' filter or null

// ALL of a hotel's dated touches: your manual follow-ups + revives AND the
// machine's scheduled sequence sends (a hotel appears on every relevant day).
function allTouches(h) {
  const out = [];
  if (h.next_follow_up) out.push({ t: h.next_follow_up, kind: 'manual' });
  const seq = h.sequence;
  if (seq && !seq.canceled_at) {
    for (const e of seq.emails || []) {
      if (e.status === 'scheduled' && e.scheduled_at) out.push({ t: e.scheduled_at, kind: 'auto' });
    }
  }
  if (seq && seq.started_at && ['prospect', 'contacted'].includes(h.pilot_status)
      && !(h.last_reply_at && new Date(h.last_reply_at) >= new Date(seq.started_at))) {
    out.push({ t: new Date(new Date(seq.started_at).getTime() + 42 * 864e5).toISOString(), kind: 'revive' });
  }
  return out;
}
function renderCalendar() {
  const box = $('cal'); if (!box) return;
  box.style.display = hotels.length ? 'block' : 'none';
  if (!hotels.length) return;
  const today = beDay(new Date().toISOString());
  if (!calMonth) calMonth = { y: +today.slice(0, 4), m: +today.slice(5, 7) - 1 };
  const map = {};   // date → { manual, auto }
  for (const h of hotels) {
    for (const t of allTouches(h)) {
      const d = beDay(t.t);
      map[d] = map[d] || { manual: 0, auto: 0 };
      map[d][t.kind === 'auto' ? 'auto' : 'manual']++;
    }
  }
  const first = new Date(Date.UTC(calMonth.y, calMonth.m, 1));
  const daysIn = new Date(Date.UTC(calMonth.y, calMonth.m + 1, 0)).getUTCDate();
  const lead = (first.getUTCDay() + 6) % 7;   // Monday-start
  $('cal-title').textContent = first.toLocaleDateString('en-GB', { month: 'long', year: 'numeric', timeZone: 'UTC' });
  const cells = ['M', 'T', 'W', 'T', 'F', 'S', 'S'].map(d => `<div class="cal-dow">${d}</div>`);
  for (let i = 0; i < lead; i++) cells.push('<div class="cal-cell"></div>');
  for (let d = 1; d <= daysIn; d++) {
    const ds = `${calMonth.y}-${String(calMonth.m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const m = map[ds];
    const badges = m ? `<span class="cal-badges">${
      m.manual ? `<span class="cal-count${ds < today ? ' late' : ''}" title="your follow-ups">${m.manual}</span>` : ''}${
      m.auto ? `<span class="cal-count auto" title="automated emails">${m.auto}</span>` : ''}</span>` : '';
    const cls = ['cal-cell', 'in-month',
      m ? 'has' : '', ds === today ? 'today' : '', ds === calSelected ? 'selected' : ''].filter(Boolean).join(' ');
    cells.push(`<div class="${cls}" data-d="${ds}">${d}${badges}</div>`);
  }
  $('cal-grid').innerHTML = cells.join('');
  for (const c of $('cal-grid').querySelectorAll('.cal-cell.has')) {
    c.onclick = () => { calSelected = calSelected === c.dataset.d ? null : c.dataset.d; renderList(); };
  }
  $('cal-hint').textContent = calSelected
    ? `Showing every hotel with a touch on ${calSelected} — click the day again to clear.`
    : 'Teal = your follow-ups · violet = automated emails · red = overdue · click a day to filter the list.';
}

function sortVal(h, key) {
  switch (key) {
    case 'name':      return (h.name || '').toLowerCase();
    case 'status':    return ST_ORDER[h.pilot_status] ?? 99;
    case 'next':      { const n = nextTouch(h); return n ? new Date(n.t).getTime() : null; }
    case 'lastmail':  return h.last_email_at ? new Date(h.last_email_at).getTime() : null;
    case 'lastreply': return h.last_reply_at ? new Date(h.last_reply_at).getTime() : null;
    case 'demo':      return h.demo_url ? (h.name || '').toLowerCase() : null;
    default:          return null;
  }
}
function renderList() {
  renderMetrics();
  renderCalendar();
  const q = $('search').value.trim().toLowerCase();
  const rows = hotels.filter(h => {
    if (statusFilter && h.pilot_status !== statusFilter) return false;
    if (calSelected && !allTouches(h).some(t => beDay(t.t) === calSelected)) return false;
    if (!q) return true;
    const hay = [h.name, h.city, h.notes, ...(h.contacts || []).map(c => `${c.name || ''} ${c.email || ''}`)].join(' ').toLowerCase();
    return hay.includes(q);
  });
  rows.sort((a, b) => {   // empty values always sink to the bottom
    const va = sortVal(a, sortKey), vb = sortVal(b, sortKey);
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
  });
  for (const th of document.querySelectorAll('th.sortable')) {
    th.querySelector('.arrow').textContent = th.dataset.key === sortKey ? (sortDir === 1 ? '▲' : '▼') : '';
  }
  $('count').textContent = `${hotels.length} hotel${hotels.length === 1 ? '' : 's'}`;
  $('empty').style.display = rows.length ? 'none' : 'block';
  $('rows').innerHTML = rows.map(h => {
    const c = (h.contacts || [])[0];
    const nt = nextTouch(h);
    return `<tr data-id="${h.id}">
      <td><div class="h-name">${esc(h.name)}</div><div class="h-city">${esc(h.city || '')}${c ? (h.city ? ' · ' : '') + esc(c.name || c.email || '') : ''}</div></td>
      <td><span class="badge st-${esc(h.pilot_status)}">${esc(ST_LABEL[h.pilot_status] || h.pilot_status)}</span></td>
      <td>${nt ? `<span class="${followUpClass(nt.t)}">${fmtDT(nt.t)}</span>${nt.kind === 'auto' ? '<span class="auto-tag">✉ AUTO</span>' : nt.kind === 'revive' ? '<span class="revive-tag">♻ REVIVE</span>' : ''}` : '<span class="dim">—</span>'}</td>
      <td class="dim">${fmtDT(h.last_email_at, false) || '—'}</td>
      <td class="dim">${fmtDT(h.last_reply_at, false) || '—'}</td>
      <td>${h.demo_url ? `<a class="demo-link" href="${esc(h.demo_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">demo ↗</a>` : '<span class="dim">—</span>'}</td>
    </tr>`;
  }).join('');
  for (const tr of $('rows').querySelectorAll('tr')) {
    tr.onclick = () => openDrawer(hotels.find(h => h.id === +tr.dataset.id));
  }
}
$('search').addEventListener('input', renderList);
for (const th of document.querySelectorAll('th.sortable')) {
  th.onclick = () => {
    const k = th.dataset.key;
    if (sortKey === k) sortDir = -sortDir; else { sortKey = k; sortDir = 1; }
    renderList();
  };
}
$('cal-prev').onclick = () => { calMonth.m--; if (calMonth.m < 0) { calMonth.m = 11; calMonth.y--; } renderCalendar(); };
$('cal-next').onclick = () => { calMonth.m++; if (calMonth.m > 11) { calMonth.m = 0; calMonth.y++; } renderCalendar(); };
$('cal-today').onclick = () => { calMonth = null; calSelected = null; renderList(); };

/* ---------- quick log ---------- */
$('ql-go').onclick = async () => {
  const text = $('ql-text').value.trim();
  if (!text) return;
  const btn = $('ql-go');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Thinking…';
  try {
    const d = await api('note', { method: 'POST', body: { text } });
    if (d.summary) { proposal = null; renderSummary(d.summary); }   // query, not a log
    else { proposal = d.proposal; renderSummary(null); renderProposal(); }
  } catch (e) { toast('Failed: ' + e.message); }
  btn.disabled = false; btn.textContent = 'Log it';
};
function renderSummary(s) {
  const box = $('proposal');
  if (!s) return;   // (null clears nothing here; proposal render owns the box otherwise)
  proposal = null;
  const stats = (s.stats || []).map(x =>
    `<span class="sum-stat"><b>${x.n}</b> ${esc(x.label)}</span>`).join('');
  box.innerHTML = `
    <div class="p-head" style="color:var(--cyan)">Activity · last ${s.windowDays} days <span style="font-weight:500;color:var(--text-dim)">(${esc(s.from)} → ${esc(s.to)})</span></div>
    ${s.total ? `<div class="sum-stats">${stats}</div>` : '<div class="dim" style="font-size:13.5px">No logged activity in this window.</div>'}
    ${s.narrative ? `<div class="sum-narr">${esc(s.narrative)}</div>` : ''}
    <div class="p-actions"><button class="btn2" id="sum-close">Close</button></div>`;
  box.classList.add('show');
  $('sum-close').onclick = () => { box.classList.remove('show'); box.innerHTML = ''; $('ql-text').value = ''; };
}
function renderProposal() {
  const p = proposal, box = $('proposal');
  if (!p) { box.classList.remove('show'); box.innerHTML = ''; return; }
  const target = p.hotelId
    ? `<b>${esc(p.hotelName)}</b>`
    : p.newHotelName ? `<b>${esc(p.newHotelName)}</b> <span style="color:var(--orange)">(new hotel)</span>`
    : '<span style="color:var(--red)">no hotel matched — pick one below</span>';
  const items = [];
  for (const [k, v] of Object.entries(p.fields || {})) {
    if (k === 'contact') items.push(`<li><b>Contact:</b> ${esc([v.name, v.role, v.email, v.phone].filter(Boolean).join(' · '))}</li>`);
    else if (k === 'pilot_status') items.push(`<li><b>Status:</b> ${esc(ST_LABEL[v] || v)}</li>`);
    else if (k.endsWith('_at') || k === 'next_follow_up') items.push(`<li><b>${esc(FIELD_LABEL[k] || k)}:</b> ${esc(fmtDT(v))}</li>`);
    else items.push(`<li><b>${esc(FIELD_LABEL[k] || k)}:</b> ${esc(v)}</li>`);
  }
  const picker = (!p.hotelId && !p.newHotelName)
    ? `<select id="p-pick" style="margin-top:8px;font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:9px">
        <option value="">— choose hotel —</option>
        ${hotels.map(h => `<option value="${h.id}">${esc(h.name)}</option>`).join('')}
       </select>` : '';
  box.innerHTML = `
    <div class="p-head">Will update ${target} — <span style="font-weight:500">${esc(p.summary)}</span></div>
    <ul>${items.join('') || '<li class="dim">No field changes — logged as a note only.</li>'}</ul>
    ${picker}
    <div class="p-actions">
      <button class="btn" id="p-yes">Confirm</button>
      <button class="btn2" id="p-no">Cancel</button>
    </div>`;
  box.classList.add('show');
  $('p-no').onclick = () => { proposal = null; renderProposal(); };
  $('p-yes').onclick = applyProposal;
}
async function applyProposal() {
  const p = proposal;
  let hotelId = p.hotelId;
  if (!hotelId && !p.newHotelName) {
    const pick = $('p-pick') && $('p-pick').value;
    if (!pick) { toast('Pick a hotel first'); return; }
    hotelId = +pick;
  }
  const btn = $('p-yes');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Saving…';
  try {
    const r = await api('apply', { method: 'POST', body: {
      hotelId, newHotelName: p.newHotelName, fields: p.fields, raw: p.raw, kind: p.kind, summary: p.summary,
    }});
    proposal = null; renderProposal();
    $('ql-text').value = '';
    toast(r.sequenceCanceled ? 'Saved ✓ — scheduled follow-ups canceled (reply logged)' : 'Saved ✓');
    await refresh();
  } catch (e) { toast('Save failed: ' + e.message); btn.disabled = false; btn.textContent = 'Confirm'; }
}

// Per-hotel AI box: log an interaction OR ask a question, scoped to this hotel.
async function runAiNote() {
  const text = $('ai-text').value.trim();
  if (!text || !current || !current.id) return;
  const hid = current.id, out = $('ai-out'), btn = $('ai-go');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Thinking…';
  try {
    const d = await api('note', { method: 'POST', body: { text, hotelId: hid } });
    if (d.answer !== undefined) out.innerHTML = `<div class="ai-answer">${esc(d.answer)}</div>`;
    else if (d.proposal) renderDrawerProposal(d.proposal, hid);
  } catch (e) { toast('Failed: ' + e.message); }
  btn.disabled = false; btn.textContent = 'Log or ask';
}
function renderDrawerProposal(p, hid) {
  const out = $('ai-out'), items = [];
  for (const [k, v] of Object.entries(p.fields || {})) {
    if (k === 'contact') items.push(`<li><b>Contact:</b> ${esc([v.name, v.role, v.email, v.phone].filter(Boolean).join(' · '))}</li>`);
    else if (k === 'pilot_status') items.push(`<li><b>Status:</b> ${esc(ST_LABEL[v] || v)}</li>`);
    else if (k.endsWith('_at') || k === 'next_follow_up') items.push(`<li><b>${esc(FIELD_LABEL[k] || k)}:</b> ${esc(fmtDT(v))}</li>`);
    else items.push(`<li><b>${esc(FIELD_LABEL[k] || k)}:</b> ${esc(v)}</li>`);
  }
  out.innerHTML = `
    <div class="ai-prop">
      <div class="p-head">${esc(p.summary)}</div>
      <ul>${items.join('') || '<li class="dim">No field changes — logged as a note only.</li>'}</ul>
      <div class="p-actions"><button class="btn" id="ai-yes">Confirm</button><button class="btn2" id="ai-no">Cancel</button></div>
    </div>`;
  $('ai-no').onclick = () => { out.innerHTML = ''; };
  $('ai-yes').onclick = async () => {
    const b = $('ai-yes'); b.disabled = true; b.innerHTML = '<span class="spin"></span>Saving…';
    try {
      const r = await api('apply', { method: 'POST', body: {
        hotelId: hid, fields: p.fields, raw: p.raw, kind: p.kind, summary: p.summary,
      }});
      toast(r.sequenceCanceled ? 'Saved ✓ — scheduled follow-ups canceled (reply logged)' : 'Saved ✓');
      await refresh();
      const updated = hotels.find(h => h.id === hid);
      if (updated) openDrawer(updated);   // re-renders fields + reloads History
    } catch (e) { toast('Save failed: ' + e.message); b.disabled = false; b.textContent = 'Confirm'; }
  };
}
function bindContactDels() {
  for (const b of document.querySelectorAll('.c-del')) b.onclick = e => e.target.closest('.contact-row').remove();
  // call/email act on whatever is currently typed in the row — stays correct mid-edit
  for (const b of document.querySelectorAll('.c-call')) b.onclick = e => {
    const v = e.target.closest('.contact-row').querySelector('.c-phone').value.trim();
    if (v) window.location.href = 'tel:' + v.replace(/[^\d+]/g, '');
    else toast('No phone number on this contact');
  };
  for (const b of document.querySelectorAll('.c-mail')) b.onclick = e => {
    const v = e.target.closest('.contact-row').querySelector('.c-email').value.trim();
    if (v) window.location.href = 'mailto:' + v;
    else toast('No email on this contact');
  };
}
function collectContacts() {
  return [...document.querySelectorAll('.contact-row')].map(r => ({
    name: r.querySelector('.c-name').value.trim() || null,
    role: r.querySelector('.c-role').value.trim() || null,
    email: r.querySelector('.c-email').value.trim() || null,
    phone: r.querySelector('.c-phone').value.trim() || null,
  })).filter(c => c.name || c.email || c.phone);
}
async function saveDrawer() {
  const btn = $('d-save');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Saving…';
  try {
    const hotel = {
      id: current.id || undefined,
      name: $('f-name').value.trim(),

      pilot_status: $('f-status').value,

async function deleteCurrent() {

// Collapsible + inline-editable outreach. Email #1 open by default; follow-ups
/* ---------- billing (Mollie SEPA Direct Debit) ---------- */
const ST_BILL = { none: 'Not started', mandate_pending: 'Awaiting mandate', active: 'Active', past_due: 'Past due', canceled: 'Canceled' };
async function renderBilling(h) {
  const box = $('bill-body'), badge = $('bill-badge');
  if (!box) return;
  const status = h.billing_status || 'none';
  badge.textContent = ST_BILL[status] || status;
  badge.style.cssText = 'font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;' +
    (status === 'active' ? 'background:#e5f6ee;color:#137a4f' :
     status === 'past_due' ? 'background:#fdeaea;color:#c0392b' :
     status === 'mandate_pending' ? 'background:#fff4e0;color:#a5731a' :
     status === 'canceled' ? 'background:#f1f1f4;color:#777' : 'background:#eef0f4;color:#666');
  var DEF = { vat_rate: 21, default_plan: 'lite', plans: { lite: { label: 'Lite', price_cents: 9900, setup_fee_cents: 19900 }, pro: { label: 'Pro', price_cents: 19900, setup_fee_cents: 19900 }, enterprise: { label: 'Enterprise', price_cents: 39900, setup_fee_cents: 0 } } };
  var cfg = DEF, configured = true;
  try { const s = await api('get_billing_settings'); if (s.settings && s.settings.plans) cfg = s.settings; configured = s.configured; } catch (_) {}
  const vat = cfg.vat_rate, g = c => '€' + (Math.round(c * (1 + vat / 100)) / 100).toFixed(2);
  const planKey = (h.plan && cfg.plans[h.plan]) ? h.plan : cfg.default_plan;
  let html = '';
  if (!configured) html += '<p style="font-size:12.5px;color:var(--red);margin:0 0 8px">⚠ Mollie not configured on the server (MOLLIE_API_KEY missing).</p>';

  if (status === 'active' || status === 'past_due') {
    const label = (cfg.plans[planKey] || {}).label || planKey;
    const monthlyNet = Number.isFinite(h.plan_price_cents) ? h.plan_price_cents : (cfg.plans[planKey] || {}).price_cents;
    html += `<p style="font-size:13px;margin:0 0 10px">Plan <b>${esc(label)}</b> · <b>${g(monthlyNet)}</b>/mo <span class="dim">(incl. ${vat}% VAT)</span></p>`;
    if (!h.mollie_subscription_id)
      html += `<div style="font-size:12.5px;color:#a5731a;margin:0 0 10px;background:#fff4e0;border:1px solid rgba(165,115,26,.25);border-radius:8px;padding:9px 11px">⚠ Monthly subscription not created yet (the SEPA mandate may have needed a moment to become valid). <button class="btn2" id="bill-retrysub" style="font-size:12px;padding:5px 10px;margin-top:6px">Create subscription</button></div>`;
    html += `<button class="btn-danger" id="bill-cancel" style="font-size:13px;padding:8px 14px">Cancel subscription</button>`;
  } else {
    // none | canceled | mandate_pending — amounts stay editable; regenerate the link if you change them.
    if (status === 'mandate_pending') {
      html += `<p class="dim" style="font-size:12.5px;margin:0 0 8px">A checkout link is out — waiting for the hotel to approve the SEPA mandate. Change the amounts below and generate an updated link if needed.</p>`;
      if (h._checkoutUrl) html += checkoutBox(h._checkoutUrl, h._checkoutTo);
    }
    const tier = cfg.plans[planKey];
    // Prefill from what's already set on this hotel (so a mistake is visible/fixable), else the tier default.
    const priceVal = Number.isFinite(h.plan_price_cents) ? h.plan_price_cents / 100 : tier.price_cents / 100;
    const setupVal = Number.isFinite(h.plan_setup_cents) ? h.plan_setup_cents / 100 : tier.setup_fee_cents / 100;
    const opts = Object.keys(cfg.plans).map(k => `<option value="${k}"${k === planKey ? ' selected' : ''}>${esc(cfg.plans[k].label)}</option>`).join('');
    const inp = 'width:100%;margin-top:4px;padding:8px;border:1px solid var(--line);border-radius:8px;font:inherit';
    html += `<div style="display:flex;flex-direction:column;gap:10px">
      <label style="font-size:12.5px;font-weight:600">Plan<select id="bill-plan" style="${inp}">${opts}</select></label>
      <div style="display:flex;gap:10px">
        <label style="flex:1;font-size:12.5px;font-weight:600">Monthly € <span class="dim">excl. VAT</span><input id="bill-price" type="number" min="0" step="1" value="${priceVal}" style="${inp}"></label>
        <label style="flex:1;font-size:12.5px;font-weight:600">Setup € <span class="dim">excl. VAT · 0 = waived</span><input id="bill-setup" type="number" min="0" step="1" value="${setupVal}" style="${inp}"></label>
      </div>
      <p id="bill-gross" class="dim" style="font-size:12px;margin:0"></p>
      <button class="btn" id="bill-start" style="font-size:13px;padding:9px 16px">${status === 'mandate_pending' ? 'Generate updated link' : 'Start billing — send checkout link'}</button>
    </div>`;
  }
  if (status !== 'none' && status !== 'canceled')
    html += `<div style="margin-top:12px"><button class="btn2" id="bill-reset" style="font-size:11.5px;padding:4px 10px;color:var(--dim)">Reset billing state</button></div>`;
  html += '<div id="bill-charges" style="margin-top:12px"></div>';
  box.innerHTML = html;

  const planSel = $('bill-plan');
  if (planSel) {
    const priceIn = $('bill-price'), setupIn = $('bill-setup'), grossP = $('bill-gross');
    const upd = () => {
      const p = +priceIn.value || 0, s = +setupIn.value || 0;
      grossP.innerHTML = s > 0
        ? `Guest pays <b>${g(p * 100)}</b>/mo + <b>${g(s * 100)}</b> setup · incl. ${vat}% VAT`
        : `Guest pays <b>${g(p * 100)}</b>/mo · first month collected up front, no setup · incl. ${vat}% VAT`;
    };
    planSel.onchange = () => { const t = cfg.plans[planSel.value]; if (t) { priceIn.value = t.price_cents / 100; setupIn.value = t.setup_fee_cents / 100; } upd(); };
    priceIn.oninput = upd; setupIn.oninput = upd; upd();
    $('bill-start').onclick = startBilling;
  }
  const restart = $('bill-restart'); if (restart) restart.onclick = startBilling;
  if ($('bill-cancel')) $('bill-cancel').onclick = cancelBilling;
  if ($('bill-retrysub')) $('bill-retrysub').onclick = retrySubscription;
  if ($('bill-reset')) $('bill-reset').onclick = resetBilling;
  loadCharges(h.id);
}
async function startBilling() {
  if (!current || !current.id) return;
  const planSel = $('bill-plan');
  const body = { hotelId: current.id };
  if (planSel) {
    body.plan = planSel.value;
    body.price_cents = Math.round((+$('bill-price').value || 0) * 100);
    body.setup_fee_cents = Math.round((+$('bill-setup').value || 0) * 100);
    if (body.price_cents <= 0) { alert('Set a monthly price above €0 first.'); return; }
  }
  const btn = $('bill-start') || $('bill-restart'); if (btn) { btn.disabled = true; btn.textContent = 'Creating…'; }
  try {
    const r = await api('billing_start', { method: 'POST', body });
    current.billing_status = 'mandate_pending';
    current._checkoutUrl = r.checkoutUrl; current._checkoutTo = r.to;   // kept in memory so re-renders can show it
    if (planSel) { current.plan = body.plan; current.plan_price_cents = body.price_cents; current.plan_setup_cents = body.setup_fee_cents; }
    await renderBilling(current);   // renderBilling paints the link box from _checkoutUrl
    refresh();
  } catch (e) { alert('Billing: ' + e.message); if (btn) { btn.disabled = false; } renderBilling(current); }
}
// The Mollie checkout link, shown in the drawer for you to copy & send the hotel.
function checkoutBox(url, to) {
  return `<div style="background:#f5f2fb;border:1px solid var(--line);border-radius:10px;padding:10px;margin:0 0 10px;font-size:12.5px">` +
    `Checkout link${to ? ` for <b>${esc(to)}</b>` : ''} — open it to test, or send it to the hotel:` +
    `<div style="display:flex;gap:6px;margin-top:6px"><input readonly value="${esc(url || '')}" style="flex:1;font-size:12px;padding:6px 8px;border:1px solid var(--line);border-radius:8px" onclick="this.select()">` +
    `<button class="btn2" style="font-size:12px;padding:6px 10px" onclick="navigator.clipboard&&navigator.clipboard.writeText(this.previousElementSibling.value);this.textContent='Copied'">Copy</button>` +
    `<a class="btn2" style="font-size:12px;padding:6px 10px;text-decoration:none" href="${esc(url || '#')}" target="_blank" rel="noopener">Open ↗</a></div></div>`;
}
async function cancelBilling() {
  if (!current || !current.id) return;
  if (!confirm('Cancel this hotel’s subscription? Mollie will stop collecting.')) return;
  const btn = $('bill-cancel'); if (btn) { btn.disabled = true; btn.textContent = 'Canceling…'; }
  try {
    await api('billing_cancel', { method: 'POST', body: { hotelId: current.id } });
    current.billing_status = 'canceled';
    renderBilling(current); refresh();
  } catch (e) { alert('Billing: ' + e.message); if (btn) { btn.disabled = false; btn.textContent = 'Cancel subscription'; } }
}
async function retrySubscription() {
  if (!current || !current.id) return;
  const btn = $('bill-retrysub'); if (btn) { btn.disabled = true; btn.textContent = 'Creating…'; }
  try {
    const r = await api('billing_retry_subscription', { method: 'POST', body: { hotelId: current.id } });
    current.mollie_subscription_id = r.subscriptionId;
    renderBilling(current); refresh();
  } catch (e) { alert('Subscription: ' + e.message); if (btn) { btn.disabled = false; btn.textContent = 'Create subscription'; } }
}
async function resetBilling() {
  if (!current || !current.id) return;
  if (!confirm('Reset billing for this hotel? Clears the Mollie customer/subscription + status so you can start fresh (cancels any live subscription).')) return;
  try {
    await api('billing_reset', { method: 'POST', body: { hotelId: current.id } });
    current.billing_status = 'none'; current.mollie_customer_id = null; current.mollie_subscription_id = null;
    current.plan_price_cents = null; current.plan_setup_cents = null; current._checkoutUrl = null;
    renderBilling(current); refresh();
  } catch (e) { alert('Reset: ' + e.message); }
}
async function loadCharges(hotelId) {
  const box = $('bill-charges'); if (!box) return;
  let charges = [];
  try { const d = await api('billing_charges', { qs: '&hotelId=' + hotelId }); charges = d.charges || []; } catch (_) { return; }
  if (!charges.length) { box.innerHTML = ''; return; }
  const money = c => '€' + ((c || 0) / 100).toFixed(2);
  const rows = charges.map(c => {
    const dt = c.paid_at ? fmtDT(c.paid_at) : '—';
    const stTag = c.status === 'paid' ? '<span style="color:#137a4f">paid</span>' : `<span style="color:#c0392b">${esc(c.status)}</span>`;
    const inv = c.status === 'paid' ? `<label style="font-size:11.5px;cursor:pointer"><input type="checkbox" ${c.invoiced ? 'checked' : ''} data-cid="${c.id}" class="inv-chk"> invoiced</label>` : '';
    return `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--line);font-size:12.5px">` +
      `<span>${dt} · ${c.kind === 'setup' ? 'Setup' : 'Monthly'}</span>` +
      `<span style="display:flex;gap:10px;align-items:center"><b>${money(c.gross_cents)}</b> ${stTag} ${inv}</span></div>`;
  }).join('');
  box.innerHTML = `<div style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:2px">Charges</div>${rows}`;
  for (const chk of box.querySelectorAll('.inv-chk')) {
    chk.onchange = async () => {
      try { await api('mark_invoiced', { method: 'POST', body: { chargeId: +chk.dataset.cid, invoiced: chk.checked } }); }
      catch (e) { alert(e.message); chk.checked = !chk.checked; }
    };
  }
}

// collapsed to a preview. Edits go into oDraft; one Save recomposes via op=save_outreach.
let oDraft = null;
function oPrev(t) { const s = String(t || '').replace(/\s+/g, ' ').trim(); return s ? esc(s.length > 150 ? s.slice(0, 150) + '…' : s) : '<span class="dim">(empty)</span>'; }
function renderOutreach(o) {
  oDraft = { subject: o.subject || '', email: o.email || '', followup1: o.followup1 || '', followup2: o.followup2 || '' };
  const html = { email: o.email_html, followup1: o.followup1_html, followup2: o.followup2_html };
  const saved = JSON.stringify(oDraft);
  const block = (key, label, open) => `
    <div class="o-block" data-key="${key}">
      <div class="o-bhead">
        <button class="o-toggle" data-key="${key}">${label} <span class="o-chev">${open ? '▾' : '▸'}</span></button>
        <button class="copy-btn" data-copykey="${key}">Copy</button>
      </div>
      <div class="o-prev"${open ? ' style="display:none"' : ''}>${oPrev(oDraft[key])}</div>
      <div class="o-body"${open ? '' : ' style="display:none"'}>
        <div class="o-view">${html[key] || esc(oDraft[key])}</div>
        <div class="o-editwrap" style="display:none"><textarea class="o-ta" data-key="${key}" style="min-height:${key === 'email' ? 230 : 120}px">${esc(oDraft[key])}</textarea></div>
        <button class="o-editbtn" data-key="${key}">✏ Edit text</button>
      </div>
    </div>`;
  $('o-out').innerHTML = `
    <div class="o-meta" style="margin-bottom:8px">Generated ${fmtDT(o.generated_at)}${o.edited_at ? ' · edited ' + fmtDT(o.edited_at) : ''}${o.site_fetched === false ? ' · ⚠ website could not be fetched — personalization is generic' : ''}</div>
    <div class="o-block">
      <div class="o-bhead"><span class="o-toggle" style="cursor:default">Subject</span><button class="copy-btn" data-copykey="subject">Copy</button></div>
      <input id="oe-subject" class="o-ta" value="${esc(oDraft.subject)}" style="min-height:0;padding:9px 12px;margin-top:9px">
    </div>
    ${block('email', 'Email #1', true)}
    ${block('followup1', 'Follow-up #1 (~day 4)', false)}
    ${block('followup2', 'Follow-up #2 (~day 8)', false)}
    <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
      <button class="btn" id="o-save" style="font-size:13px;padding:9px 18px" disabled>Save changes</button>
      <span class="dim" style="font-size:11.5px">Blocks show the formatted email; “Edit text” swaps to plain text — the formatted version is rebuilt on save.</span>
    </div>`;
  const dirty = () => { $('o-save').disabled = JSON.stringify(oDraft) === saved; };
  $('oe-subject').oninput = e => { oDraft.subject = e.target.value; dirty(); };
  for (const t of $('o-out').querySelectorAll('.o-toggle[data-key]')) t.onclick = () => {
    const blk = t.closest('.o-block'), body = blk.querySelector('.o-body'), prev = blk.querySelector('.o-prev');
    const openNow = body.style.display === 'none';
    if (!openNow) prev.innerHTML = oPrev(oDraft[t.dataset.key]);
    body.style.display = openNow ? '' : 'none'; prev.style.display = openNow ? 'none' : '';
    t.querySelector('.o-chev').textContent = openNow ? '▾' : '▸';
  };
  for (const b of $('o-out').querySelectorAll('.o-editbtn')) b.onclick = () => {
    const blk = b.closest('.o-block'), view = blk.querySelector('.o-view'), ew = blk.querySelector('.o-editwrap');
    const editing = ew.style.display !== 'none';
    view.style.display = editing ? '' : 'none'; ew.style.display = editing ? 'none' : '';
    b.textContent = editing ? '✏ Edit text' : '👁 Preview';
    if (!editing) ew.querySelector('textarea').focus();
  };
  for (const ta of $('o-out').querySelectorAll('.o-ta[data-key]')) ta.oninput = e => { oDraft[e.target.dataset.key] = e.target.value; dirty(); };
  for (const b of $('o-out').querySelectorAll('.copy-btn[data-copykey]')) b.onclick = () => {
    navigator.clipboard.writeText(oDraft[b.dataset.copykey] || ''); b.textContent = 'Copied ✓'; setTimeout(() => b.textContent = 'Copy', 1500);
  };
  $('o-save').onclick = async () => {
    const btn = $('o-save'); btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Saving…';
    try {
      const d = await api('save_outreach', { method: 'POST', body: { hotelId: current.id, outreach: {
        subject: oDraft.subject, email: oDraft.email, followup1: oDraft.followup1, followup2: oDraft.followup2,
      }}});
      current.outreach = d.outreach;
      const h = hotels.find(x => x.id === current.id); if (h) h.outreach = d.outreach;
      renderOutreach(d.outreach); renderSeq();
      toast('Drafts saved ✓');
    } catch (e) { toast('Save failed: ' + e.message); btn.disabled = false; btn.textContent = 'Save changes'; }
  };
}
async function generateOutreach() {
  const btn = $('o-gen');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Reading their website & writing…';
  try {
    const d = await api('outreach', { method: 'POST', body: { hotelId: current.id } });
    current.outreach = d.outreach;
    renderOutreach(d.outreach);
    renderSeq();
    toast('Outreach ready');
    refresh();
  } catch (e) { toast('Generation failed: ' + e.message); }
  btn.disabled = false; btn.textContent = '✨ Generate personalized outreach';
}

/* ---------- send sequence ---------- */
const STEP_LABEL = { email: 'Email #1', followup1: 'Follow-up #1', followup2: 'Follow-up #2' };
const STEP_ICON  = { sent: '✅', scheduled: '⏱️', canceled: '🚫', cancel_failed: '⚠️', bounced: '❌', complained: '🛑' };
// delivery/open markers written by the Resend webhook (api/crm-events.js)
function seqExtras(e) {
  const bits = [];
  if (e.status === 'bounced') bits.push('bounced' + (e.bounced_at ? ' ' + fmtDT(e.bounced_at) : ''));
  if (e.status === 'complained') bits.push('marked as spam');
  if (e.opened_at) bits.push('👁 opened ' + fmtDT(e.opened_at));
  else if (e.delivered_at) bits.push('delivered');
  if (e.clicked_at) bits.push('🔗 clicked');
  return bits.length ? ` · ${bits.join(' · ')}` : '';
}

function renderSeq() {
  const box = $('seq-box'); if (!box || !current) return;
  const h = current, seq = h.sequence;
  const withEmail = (h.contacts || []).filter(c => c.email);
  let html = '';
  if (seq) {
    const pending = !seq.canceled_at && (seq.emails || []).some(e => e.status === 'scheduled');
    html += `<div class="o-item" style="margin-top:10px">
      <div class="o-label"><span>Sequence → ${esc(seq.to)}</span><span style="text-transform:none;letter-spacing:0">started ${fmtDT(seq.started_at)}</span></div>
      ${(seq.emails || []).map(e => `<div style="font-size:13px;padding:2px 0">${STEP_ICON[e.status] || '•'} ${esc(STEP_LABEL[e.step] || e.step)} — ${esc(e.status)}${e.sent_at ? ' ' + fmtDT(e.sent_at) : e.scheduled_at ? ', lands ' + fmtDT(e.scheduled_at) : ''}${esc(seqExtras(e))}</div>`).join('')}
      ${seq.canceled_at ? `<div class="dim" style="font-size:12px;margin-top:4px">Canceled ${fmtDT(seq.canceled_at)}${seq.cancel_reason ? ' — ' + esc(seq.cancel_reason) : ''}</div>` : ''}
      ${pending ? '<div style="margin-top:10px"><button class="btn-danger" id="seq-cancel">Cancel remaining follow-ups</button></div>' : ''}
    </div>`;
  }
  const active = seq && !seq.canceled_at && (seq.emails || []).some(e => e.status === 'scheduled');
  if (h.outreach && !active) {
    html += withEmail.length
      ? `<div style="display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap">
          <select id="seq-to" style="font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:#fff">
            ${withEmail.map(c => `<option value="${esc(c.email)}">${esc(c.name || c.email)} — ${esc(c.email)}</option>`).join('')}
          </select>
          <button class="btn" id="seq-send" style="font-size:13px;padding:8px 16px">📤 Send${seq ? ' again' : ' sequence'} from shou.be</button>
        </div>`
      : '<p class="dim" style="font-size:13px;margin-top:8px">Add a contact with an email address to send this sequence directly.</p>';
  }
  box.innerHTML = html;
  if ($('seq-send'))   $('seq-send').onclick = sendSequence;
  if ($('seq-cancel')) $('seq-cancel').onclick = cancelSequence;
}
function shortDate(d) { return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }); }
async function sendSequence() {
  const to = $('seq-to').value;
  const d4 = new Date(Date.now() + 4 * 864e5), d8 = new Date(Date.now() + 8 * 864e5);
  if (!confirm(`Send email #1 to ${to} NOW?\n\nFollow-up #1 lands ${shortDate(d4)} 09:30, follow-up #2 ${shortDate(d8)} 09:30. Both are auto-canceled the moment you log a reply.`)) return;
  const btn = $('seq-send');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Sending…';
  try {
    const d = await api('send_sequence', { method: 'POST', body: { hotelId: current.id, to } });
    toast(d.partial ? 'Email #1 sent, but follow-up scheduling failed — check history' : 'Sequence started ✓');
    await refresh();
    openDrawer(hotels.find(x => x.id === current.id) || d.hotel);
  } catch (e) {
    toast('Send failed: ' + e.message);
    btn.disabled = false; btn.textContent = '📤 Send sequence from shou.be';
  }
}
async function cancelSequence() {
  if (!confirm('Cancel the remaining scheduled follow-ups?')) return;
  try {
    await api('cancel_sequence', { method: 'POST', body: { hotelId: current.id } });
    toast('Follow-ups canceled');
    await refresh();
    openDrawer(hotels.find(x => x.id === current.id));
  } catch (e) { toast('Cancel failed: ' + e.message); }
}

/* ---------- log ---------- */
async function loadLog(hotelId) {
  try {
    const d = await api('log', { qs: `&hotelId=${hotelId}` });
    $('log').innerHTML = d.log.length ? d.log.map(l => `
      <div class="log-item">
        <span class="lk">${esc(l.kind)}</span><span class="lt">${esc(fmtDT(l.created_at))}</span>
        <div class="lr">${esc(l.raw || '')}</div>
      </div>`).join('') : '<p class="dim" style="font-size:13px">No history yet.</p>';
  } catch (e) { $('log').innerHTML = `<p class="dim">Could not load history: ${esc(e.message)}</p>`; }
}

/* ---------- CSV import / export ---------- */
// Shared schema — export produces exactly these columns; import reads them.
const CSV_COLS = ['hotel_name', 'city', 'pilot_status', 'website', 'demo_url',
  'next_follow_up', 'last_email_at', 'last_reply_at',
  'contact_name', 'contact_role', 'contact_email', 'contact_phone', 'notes', 'lat', 'lng'];

const csvCell = v => { v = v == null ? '' : String(v); return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; };
const toCsv = grid => grid.map(r => r.map(csvCell).join(',')).join('\r\n');
function parseCsv(text) {
  const rows = []; let row = [], cell = '', q = false;
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (q) { if (ch === '"') { if (text[i + 1] === '"') { cell += '"'; i++; } else q = false; } else cell += ch; }
    else if (ch === '"') q = true;
    else if (ch === ',') { row.push(cell); cell = ''; }
    else if (ch === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
    else cell += ch;
  }
  if (cell !== '' || row.length) { row.push(cell); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim() !== ''));
}

function exportCsv() {
  const grid = [CSV_COLS];
  for (const h of hotels) {
    const base = [h.name, h.city || '', h.pilot_status || '', h.website || '', h.demo_url || '',
      h.next_follow_up || '', h.last_email_at || '', h.last_reply_at || ''];
    const tail = [h.notes || '', h.lat ?? '', h.lng ?? ''];
    const cs = h.contacts || [];
    if (!cs.length) grid.push([...base, '', '', '', '', ...tail]);
    else for (const c of cs) grid.push([...base, c.name || '', c.role || '', c.email || '', c.phone || '', ...tail]);
  }
  const blob = new Blob(['﻿' + toCsv(grid)], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `shou-crm-${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast(`Exported ${hotels.length} hotels`);
}

let _impRows = null;
async function readImport(file) {
  let text;
  try { text = await file.text(); } catch { toast('Could not read file'); return; }
  const grid = parseCsv(text);
  if (grid.length < 2) { toast('Empty or headerless CSV'); return; }
  const header = grid[0].map(h => h.trim().toLowerCase().replace(/^﻿/, ''));
  const idx = {}; header.forEach((h, i) => { if (idx[h] == null) idx[h] = i; });
  if (idx.hotel_name == null) { toast('CSV needs a “hotel_name” column'); return; }
  const rows = grid.slice(1).map(r => {
    const o = {};
    for (const k of CSV_COLS) if (idx[k] != null) o[k] = (r[idx[k]] || '').trim();
    return o;
  }).filter(o => o.hotel_name);
  if (!rows.length) { toast('No rows with a hotel_name'); return; }
  _impRows = rows;
  let d;
  try { d = await api('import', { method: 'POST', body: { rows, dryRun: true } }); }
  catch (e) { toast('Preview failed: ' + e.message); return; }
  showImportPreview(d);
}

function closeImport() { $('imp-overlay').classList.remove('show'); $('imp-modal').classList.remove('show'); _impRows = null; }
function showImportPreview(d) {
  const stat = (n, l, cls) => `<div class="imp-stat ${cls || ''}"><div class="n">${n}</div><div class="l">${l}</div></div>`;
  const rows = (d.sample || []).map(s => s.kind === 'new'
    ? `<div class="r"><span><b>${esc(s.name)}</b>${s.city ? ' · ' + esc(s.city) : ''} <span class="dim">(${s.contacts} contact${s.contacts === 1 ? '' : 's'})</span></span><span class="imp-tag new">NEW</span></div>`
    : `<div class="r"><span><b>${esc(s.name)}</b> <span class="dim">+${s.added} contact${s.added === 1 ? '' : 's'}</span></span><span class="imp-tag exist">EXISTING</span></div>`
  ).join('');
  const nothing = !d.created && !d.updated;
  $('imp-body').innerHTML = `
    <h3>Import preview</h3>
    <div class="imp-sub">${d.hotels} hotel${d.hotels === 1 ? '' : 's'} in the file. Nothing is written until you confirm — existing hotels only <b>gain contacts</b>, their other fields are never overwritten.</div>
    <div class="imp-stats">
      ${stat(d.created, 'New hotels', 'new')}
      ${stat(d.updated, 'Existing +contacts', 'upd')}
      ${stat(d.contactsAdded, 'Contacts added')}
      ${d.badRows ? stat(d.badRows, 'Skipped (no name)', 'warn') : ''}
    </div>
    ${rows ? `<div class="imp-list">${rows}${(d.sample || []).length < d.hotels ? `<div class="r dim">…and ${d.hotels - d.sample.length} more</div>` : ''}</div>` : ''}
    <div class="imp-actions">
      <button class="btn2" id="imp-cancel">Cancel</button>
      <button class="btn" id="imp-confirm"${nothing ? ' disabled' : ''}>${nothing ? 'Nothing to import' : 'Import ' + d.contactsAdded + ' contact' + (d.contactsAdded === 1 ? '' : 's')}</button>
    </div>`;
  $('imp-overlay').classList.add('show'); $('imp-modal').classList.add('show');
  $('imp-cancel').onclick = closeImport;
  $('imp-overlay').onclick = closeImport;
  if (!nothing) $('imp-confirm').onclick = async () => {
    const btn = $('imp-confirm'); btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Importing…';
    try {
      const r = await api('import', { method: 'POST', body: { rows: _impRows } });
      closeImport();
      toast(`Imported: ${r.created} new, ${r.updated} updated, ${r.contactsAdded} contacts`);
      await refresh();
    } catch (e) { toast('Import failed: ' + e.message); btn.disabled = false; btn.textContent = 'Retry import'; }
  };
}

$('btn-export').onclick = exportCsv;
$('btn-import').onclick = () => $('import-file').click();

/* ---------- outreach settings (admin) ---------- */
let setDefaults = {};
function closeSettings() { $('set-overlay').classList.remove('show'); $('set-modal').classList.remove('show'); }
async function openSettings() {
  let d;
  try { d = await api('get_settings'); } catch (e) { toast('Could not load settings: ' + e.message); return; }
  setDefaults = d.defaults || {};
  const s = d.settings || {};
  const field = (key, label, hint, rows) => `
    <div class="set-field">
      <div class="set-lh"><label>${label}</label><button class="set-reset" data-key="${key}">Reset to default</button></div>
      <textarea id="set-${key}" rows="${rows}">${esc(s[key] ?? '')}</textarea>
      ${hint ? `<div class="set-hint">${hint}</div>` : ''}
    </div>`;
  $('set-body').innerHTML = `
    <h3>Outreach settings</h3>
    <div class="set-sub">Changes what every generated email says. The email structure, links and demo/video stay fixed — this only edits the copy the AI works from. Empty field = use the default.</div>
    ${field('tone', 'AI tone & guidance', 'Applied to the opening line, the 3 guest-question bullets and the follow-ups. e.g. “warmer, less salesy; emphasise saving reception time”.', 3)}
    ${field('pitch', 'Product pitch paragraph', 'The fixed value-prop paragraph inside email #1.', 4)}
    ${field('foundingDemo', 'Founding-partner line — when a demo page exists', 'Use {hotel} for the hotel name.', 3)}
    ${field('foundingNoDemo', 'Founding-partner line — when no demo yet', 'Use {hotel} for the hotel name.', 3)}
    <div class="set-actions">
      <button class="btn2" id="set-cancel">Cancel</button>
      <button class="btn" id="set-save">Save settings</button>
    </div>`;
  for (const b of $('set-body').querySelectorAll('.set-reset')) b.onclick = () => { $('set-' + b.dataset.key).value = setDefaults[b.dataset.key] || ''; };
  $('set-cancel').onclick = closeSettings;
  $('set-save').onclick = saveSettings;
  $('set-overlay').classList.add('show'); $('set-modal').classList.add('show');
}
async function saveSettings() {
  const btn = $('set-save'); btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Saving…';
  try {
    await api('save_settings', { method: 'POST', body: { settings: {
      tone: $('set-tone').value, pitch: $('set-pitch').value,
      foundingDemo: $('set-foundingDemo').value, foundingNoDemo: $('set-foundingNoDemo').value,
    }}});
    toast('Outreach settings saved ✓ — applies to the next generation');
    closeSettings();
  } catch (e) { toast('Save failed: ' + e.message); btn.disabled = false; btn.textContent = 'Save settings'; }
}
$('set-overlay').onclick = closeSettings;
$('btn-settings').onclick = openSettings;
$('import-file').onchange = e => { const f = e.target.files[0]; if (f) readImport(f); e.target.value = ''; };

/* ---------- boot ---------- */
if (token) unlock(token); else $('gate-token').focus();
</script>
